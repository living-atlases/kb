---
# Living Atlas KB - Deploy services only (no indexing)
# Use when ChromaDB is already populated and you only want to
# update/restart the REST API and MCP HTTP server.
#
# Usage:
#   ansible-playbook ansible/deploy.yml -i inventory.ini

- name: Deploy living-atlas-kb API and MCP services
  hosts: kb
  become: true
  vars:
    kb_home: /opt/la-toolkit-kb
    kb_user: ubuntu
    kb_domain: kb.l-a.site
    # Override with -e "flutter_bin=/path/to/flutter" if not on PATH
    flutter_bin: "{{ lookup('env', 'FLUTTER_BIN') | default('flutter', true) }}"

  tasks:
    - name: Copy server files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ kb_home }}/server/"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0644"
      loop:
        - ../server/__init__.py
        - ../server/api.py
        - ../server/chat.py
        - ../server/mcp_http.py
        - ../server/mcp_stdio.py
        - ../server/repos.py

    - name: Copy repos manifest
      ansible.builtin.copy:
        src: repos.yml
        dest: "{{ kb_home }}/config/repos.yml"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0644"
      tags: [repos]

    - name: Install/update server Python dependencies
      ansible.builtin.pip:
        name:
          - fastapi>=0.115
          - "uvicorn[standard]>=0.30"
          - chromadb>=0.5
          - sentence-transformers>=3.0
          - "mcp>=1.27"
          - httpx>=0.27
          - pydantic>=2.0
        state: present
        virtualenv: "{{ kb_home }}/venv"
      become_user: "{{ kb_user }}"

    - name: Create systemd service for REST API
      ansible.builtin.copy:
        dest: /etc/systemd/system/la-toolkit-kb-api.service
        mode: "0644"
        content: |
          [Unit]
          Description=Living Atlas KB REST API
          After=network.target

          [Service]
          User={{ kb_user }}
          WorkingDirectory={{ kb_home }}
          Environment=CHROMA_PATH={{ kb_home }}/data/chromadb/
          ExecStart={{ kb_home }}/venv/bin/python -m uvicorn server.api:app --host 127.0.0.1 --port 8080
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for MCP HTTP server
      ansible.builtin.copy:
        dest: /etc/systemd/system/la-toolkit-kb-mcp.service
        mode: "0644"
        content: |
          [Unit]
          Description=Living Atlas KB MCP HTTP Server
          After=la-toolkit-kb-api.service

          [Service]
          User={{ kb_user }}
          WorkingDirectory={{ kb_home }}
          Environment=KB_API_URL=http://localhost:8080
          ExecStart={{ kb_home }}/venv/bin/python server/mcp_http.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and restart services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop:
        - la-toolkit-kb-api
        - la-toolkit-kb-mcp
      tags: [repos]

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create web root directory
      ansible.builtin.file:
        path: /var/www/la-toolkit-kb
        state: directory
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"

    - name: Build Flutter web app (local)
      ansible.builtin.command:
        cmd: "{{ flutter_bin }} build web --release"
        chdir: ../dart/example
      delegate_to: localhost
      become: false

    - name: Sync Flutter web build to server
      ansible.posix.synchronize:
        src: ../dart/example/build/web/
        dest: /var/www/la-toolkit-kb/
        delete: true
        recursive: true

    # The backend terminates TLS itself with its own Let's Encrypt cert
    # (renewed by certbot.timer). `listen 443 ssl` fails `nginx -t` and leaves
    # nginx down if the cert is missing, so assert it exists before writing the
    # site. The Apache edge proxies https→443 to this backend.
    - name: Check Let's Encrypt certificate is present
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ kb_domain }}/fullchain.pem
      register: kb_cert

    - name: Fail clearly if the TLS certificate is missing
      ansible.builtin.assert:
        that: kb_cert.stat.exists
        fail_msg: >-
          Missing /etc/letsencrypt/live/{{ kb_domain }}/fullchain.pem on the backend.
          Obtain the cert (certbot) before deploying the 443 ssl nginx site, or
          nginx will fail to start.

    - name: Configure nginx — serve Flutter web over TLS + proxy /api/ to backend
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/kb
        mode: "0644"
        content: |
          server {
              listen 443 ssl;
              server_name {{ kb_domain }};

              ssl_certificate     /etc/letsencrypt/live/{{ kb_domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ kb_domain }}/privkey.pem;

              root /var/www/la-toolkit-kb;
              index index.html;

              # Proxy API calls to the Python backend
              location /api/ {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 120s;
                  # Required for SSE streaming
                  proxy_buffering off;
                  proxy_cache off;
                  chunked_transfer_encoding on;
              }

              # Health check on the REST API backend
              location /health {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              # MCP streamable-HTTP server
              location /mcp {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header Connection "";
                  proxy_http_version 1.1;
                  proxy_buffering off;
                  proxy_cache off;
                  chunked_transfer_encoding on;
              }

              # Serve Flutter web SPA — fallback to index.html
              location / {
                  try_files $uri $uri/ /index.html;
              }
          }

          server {
              listen 80;
              server_name {{ kb_domain }};
              return 301 https://$host$request_uri;
          }

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/kb
        dest: /etc/nginx/sites-enabled/kb
        state: link

    - name: Remove nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # A manually-created `la-toolkit-kb` site also binds :443 for this domain.
    # `kb` is now the single canonical 443-ssl site, so remove the duplicate to
    # avoid two server blocks competing for the same listen/server_name.
    - name: Remove duplicate la-toolkit-kb nginx site
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/la-toolkit-kb
        - /etc/nginx/sites-available/la-toolkit-kb

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted
        daemon_reload: true

    # Root cause of a past outage: UFW (default inbound DENY) allowed 80 but not
    # 443, so the Apache edge's https→443 proxy was silently dropped and the site
    # went blank. Codify both rules so the firewall never drifts again.
    - name: Allow HTTP/HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
