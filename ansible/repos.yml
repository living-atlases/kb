# Living Atlas KB — Repository Manifest
# Single source of truth for all indexed repos.
#
# URL construction: {base_url}/{name}.git
# Branch default: master (override per-repo with `branch:`)
# To add a repo: add the name under its org. Open a PR.
#
# Tier1: repos indexed first during initial setup (not a scheduling distinction).
# Scheduling is handled by kb_watcher.py (hourly RSS/Atom polling, re-index on change).

orgs:

  AtlasOfLivingAustralia:
    base_url: https://github.com/AtlasOfLivingAustralia
    repos:
      - ala-install
      - collectory
      - name: biocache-service
        wiki: true
      - biocache-hubs
      - ala-bie-hub
      - name: bie-index
        wiki: true
      - atlas-index
      - name: image-service
        wiki: true
      - specieslist-webapp
      - species-lists
      - authoritative-lists
      - spatial-hub
      - spatial-service
      - regions
      - logger-service
      - ala-namematching-service
      - ala-sensitive-data-service
      - dashboard
      - alerts
      - doi-service
      - userdetails
      - ala-cas-5
      - name: volunteer-portal
        wiki: true
      - name: ecodata
        wiki: true
      - name: profile-hub
        wiki: true
      - name: fieldcapture
        wiki: true
      - name: biocollect
        wiki: true
      - commonui-bs5-2024
      - name: documentation
        wiki: true
        description: "ALA documentation hub (wiki holds 144+ pages)"
      - name: pipelines
        branch: develop
        description: "ALA fork of GBIF pipelines (la-pipelines / livingatlas)"

  living-atlases:
    base_url: https://github.com/living-atlases
    repos:
      - name: la-toolkit
        branch: main
      - base-branding

  gbif:
    base_url: https://github.com/gbif
    repos:
      - name: pipelines
        description: "GBIF Pipelines — DarwinCore data processing (livingatlas module)"
        wiki: true
      - name: ipt
        wiki: true
      - gbif-api
      - dwca-validator
      - dwca-io
      - occurrence
      - name: registry
        wiki: true
      - checklistbank

# Repos indexed first during setup (priority order).
# All other repos are indexed after these complete.
tier1:
  - AtlasOfLivingAustralia/ala-install
  - living-atlases/la-toolkit
  - gbif/pipelines

# Global index blocklist — never indexed regardless of repo.
# Add paths/patterns here to reduce noise across all repos.
blocklist:
  - ".git/"
  - "node_modules/"
  - "build/"
  - "target/"
  - ".gradle/"
  - "molecule/"
  - "*.jar"
  - "*.class"
  - "*.pyc"
  - "*.png"
  - "*.jpg"
  - "*.gif"
  - "*.ico"
  - "*.zip"
  - "*.tar.gz"
  - "*.war"
  - "*.ear"
