# Living Atlas KB — Repository Manifest
# Single source of truth for all indexed repos.
#
# URL construction: {base_url}/{name}.git
# Branch: the repo's default branch (HEAD) is auto-detected — no need to set it.
#         Override per-repo with `branch:` only to index a NON-default branch.
# Releases: GitHub Releases are indexed by kb_releases.py (content_type=release)
#           and aggregated into data/versions.json. Opt out with `releases: false`.
# To add a repo: add the name under its org. Open a PR.
#
# Tier1: repos indexed first during initial setup (not a scheduling distinction).
# Scheduling is handled by kb_watcher.py (hourly git ls-remote polling, re-index on change).

orgs:

  AtlasOfLivingAustralia:
    base_url: https://github.com/AtlasOfLivingAustralia
    repos:
      - ala-install
      - collectory
      - name: biocache-service
        wiki: true
      - biocache-hubs
      - ala-bie-hub
      - name: bie-index
        wiki: true
      - atlas-index
      - name: image-service
        wiki: true
      - specieslist-webapp
      - species-lists
      - authoritative-lists
      - spatial-hub
      - spatial-service
      - regions
      - logger-service
      - ala-namematching-service
      - ala-sensitive-data-service
      - dashboard
      - alerts
      - doi-service
      - userdetails
      - apikey
      - sds
      - ala-cas-5
      - helm-charts
      - data-quality-filter-service
      - ala-hub
      - name: volunteer-portal
        wiki: true
      - name: ecodata
        wiki: true
      - name: profile-hub
        wiki: true
      - name: fieldcapture
        wiki: true
      - name: biocollect
        wiki: true
      - commonui-bs5-2024
      - name: documentation
        wiki: true
        description: "ALA documentation hub (wiki holds 144+ pages)"
      - name: pipelines
        description: "ALA fork of GBIF pipelines (la-pipelines / livingatlas)"

  living-atlases:
    base_url: https://github.com/living-atlases
    repos:
      - la-toolkit
      - name: la-toolkit-backend
        description: "la-toolkit backend; assets/dependencies.yaml tracks ALA component versions + deps"
      - base-branding

  gbif:
    base_url: https://github.com/gbif
    repos:
      - name: pipelines
        description: "GBIF Pipelines — DarwinCore data processing (livingatlas module)"
        wiki: true
      - name: ipt
        wiki: true
      - gbif-api
      - dwc-api               # Darwin Core term enumeration (org.gbif.dwc.terms) — heavily used by pipelines
      - dwca-io
      - vocabulary            # controlled vocabularies used in pipelines interpretation
      - occurrence
      - name: registry
        wiki: true
      - checklistbank

# Repos indexed first during setup (priority order).
# All other repos are indexed after these complete.
tier1:
  - AtlasOfLivingAustralia/ala-install
  - living-atlases/la-toolkit
  - gbif/pipelines

# Local (non-git) sources, indexed by walking a directory shipped with the KB
# (no clone/pull). `path` is relative to KB_HOME. `source_type` lands in each
# chunk's content_type metadata so retrieval can boost curated answers.
# The FAQ distils answers to recurring community questions; entries are written
# to be portable to the AtlasOfLivingAustralia/documentation wiki too.
local_sources:
  - name: la-kb-faq
    path: faq
    source_type: faq
    description: Curated FAQ for recurring Living Atlas community questions

# Global index blocklist — never indexed regardless of repo.
# Matching (see is_blocked in kb_indexer.py): a pattern ending in "/" matches any
# single path *component* with that name (at any depth); otherwise it is an
# fnmatch against the file *name*. Multi-segment paths (e.g. src/test/resources)
# do NOT work — block the leaf component instead (e.g. "test/").
blocklist:
  - ".git/"
  - "node_modules/"
  - "build/"
  - "target/"
  - ".gradle/"
  - "molecule/"
  # ── Test code & fixtures (huge noise: checklistbank test datasets were 45% of the index) ──
  - "test/"
  - "tests/"
  - "datasets/"           # checklistbank-nub/src/test/resources/datasets/*-usages.json
  - "testdata/"
  - "test-data/"          # ecodata test fixtures (hyphenated variant of testdata/)
  - "integration-test/"   # Grails src/integration-test (ecodata ~7k, fieldcapture ~3.6k: specs + JSON fixtures)
  - "fixtures/"
  # ── Vendored / generated front-end assets (Grails apps: volunteer-portal, ecodata, fieldcapture, biocollect) ──
  - "vendor/"
  - "bower_components/"
  - "dist/"
  - "coverage/"
  - "out/"
  # Grails asset-pipeline + legacy web-app resources: overwhelmingly vendored
  # JS/CSS (jQuery, Bootstrap, DataTables…). On volunteer-portal these dirs were
  # 24k of 26.6k chunks (~91%); blocking them keeps controllers/services/domain/
  # views/taglib/conf source intact. Verified: 26617 → 4922 chunks, no source lost.
  - "assets/"             # grails-app/assets (asset-pipeline: vendored+app JS/CSS/img)
  - "javascripts/"        # Grails 2 web-app/javascripts (vendored)
  - "js/"                 # Grails 2 web-app/js (vendored libs)
  - "static-design/"      # static HTML design mockups
  - "static/"             # built static-site / frontend output
  - "i18n/"               # message bundles / translations (low semantic value, bulky)
  - "forms/"              # fieldcapture form-definition JSON blobs (~18k chunks of config data)
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*-min.js"            # alt minified naming (foo-min.js)
  - "*.map"
  - "package-lock.json"   # generated npm lockfile (large, no doc value)
  - "*-usages.json"       # checklistbank nub test fixtures
  # ── Binaries / archives ──
  - "*.jar"
  - "*.class"
  - "*.pyc"
  - "*.png"
  - "*.jpg"
  - "*.gif"
  - "*.ico"
  - "*.zip"
  - "*.tar.gz"
  - "*.war"
  - "*.ear"
