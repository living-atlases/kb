---
# Living Atlas Knowledge Base - VM Setup & Indexing
# Adapted from la-toolkit-kb-setup.yml (prod-gbif-es-ansible-extras)
#
# Usage:
#   Full setup + initial index:
#     ansible-playbook ansible/setup_kb.yml -i inventory.ini
#   Re-index only (skip setup phases):
#     ansible-playbook ansible/setup_kb.yml -i inventory.ini --tags reindex
#   Re-index a single repo:
#     ansible-playbook ansible/setup_kb.yml -i inventory.ini --tags reindex -e "reindex_repo=AtlasOfLivingAustralia/collectory"

- name: Living Atlas KB - VM Setup & Indexing
  hosts: kb
  become: true
  vars:
    kb_home: /opt/la-toolkit-kb          # override for different install path
    kb_user: ubuntu                      # service user on target host
    # Offload the large, growing KB dirs (data/chromadb + cloned repos) onto a
    # secondary disk via bind-mounts, keeping the root filesystem from filling up.
    # Set to "" to disable (keeps data/repos on the root disk under kb_home).
    kb_offload_dir: /var/lib/ollama/kb   # parent must live on a mounted 2nd disk
    chroma_path: "{{ kb_home }}/data/chromadb/"
    kb_domain: kb.l-a.site              # override: -e "kb_domain=kb.myatlas.org"
    rest_api_port: 8080
    mcp_http_port: 3000
    reindex_repo: ""                     # override: -e "reindex_repo=ORG/NAME" to re-index one repo
    # GitHub token for the Releases API (kb_releases.py / watcher). Without it the
    # API is limited to ~60 req/h — too low for the full manifest. Defaults to the
    # GH_TOKEN/GITHUB_TOKEN in the controller env; override with -e "gh_token=...".
    gh_token: "{{ lookup('env', 'GH_TOKEN') | default(lookup('env', 'GITHUB_TOKEN'), true) }}"

  tasks:

    # ── Phase 1: System dependencies ─────────────────────────────────────────

    - name: "Phase 1: Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-dev
          - python3-venv
          - build-essential
          - git
          - curl
          - rsync
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    # ── Phase 1b: Host disk hygiene (prevent root fs from filling up) ─────────

    - name: "Phase 1b: Cap systemd journal size"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse='
        line: 'SystemMaxUse=200M'
      notify: Restart journald

    - name: "Phase 1b: Cap auditd log rotation"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: "^{{ item.key }}\\s*="
        line: "{{ item.key }} = {{ item.value }}"
      loop:
        - { key: "max_log_file", value: "50" }
        - { key: "num_logs", value: "5" }
        - { key: "max_log_file_action", value: "ROTATE" }
      failed_when: false   # auditd may be absent on non-hardened hosts
      notify: Restart auditd

    - name: "Phase 1b: Remove orphaned ollama models on root disk"
      # ollama is configured with OLLAMA_MODELS on the dedicated disk; the default
      # ~ollama/.ollama/models path only holds stale pre-migration models.
      ansible.builtin.file:
        path: /usr/share/ollama/.ollama/models
        state: absent

    - name: "Phase 1b: Rotate KB watcher/indexer logs"
      ansible.builtin.copy:
        dest: /etc/logrotate.d/la-toolkit-kb
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ kb_home }}/logs/*.log {
              weekly
              rotate 4
              compress
              missingok
              notifempty
              copytruncate
          }

    # ── Phase 2: Directory structure ──────────────────────────────────────────

    - name: "Phase 2: Create directory structure"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"
      loop:
        - "{{ kb_home }}"
        - "{{ kb_home }}/config"
        - "{{ kb_home }}/repos"
        - "{{ kb_home }}/scripts"
        - "{{ kb_home }}/server"
        - "{{ kb_home }}/data"
        - "{{ kb_home }}/data/chromadb"
        - "{{ kb_home }}/logs"

    # ── Phase 2b: Offload heavy data to secondary disk (keeps / from filling) ──
    # data/chromadb (grows on every reindex) and repos (grows as sources are
    # added) are bind-mounted onto a 2nd disk so the root fs never runs out.
    - name: "Phase 2b: Check secondary disk for offload is mounted"
      ansible.builtin.command: "mountpoint -q {{ kb_offload_dir | dirname }}"
      register: kb_offload_mount
      changed_when: false
      failed_when: false
      when: kb_offload_dir | length > 0

    - name: "Phase 2b: Create offload target dirs on secondary disk"
      ansible.builtin.file:
        path: "{{ kb_offload_dir }}/{{ item }}"
        state: directory
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"
      loop:
        - data
        - repos
      when:
        - kb_offload_dir | length > 0
        - kb_offload_mount.rc == 0

    - name: "Phase 2b: Bind-mount data + repos onto secondary disk"
      ansible.posix.mount:
        path: "{{ kb_home }}/{{ item }}"
        src: "{{ kb_offload_dir }}/{{ item }}"
        fstype: none
        opts: bind,nofail
        state: mounted
      loop:
        - data
        - repos
      when:
        - kb_offload_dir | length > 0
        - kb_offload_mount.rc == 0

    - name: "Phase 2b: Ensure chromadb dir exists on the mounted volume"
      ansible.builtin.file:
        path: "{{ kb_home }}/data/chromadb"
        state: directory
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"
      when:
        - kb_offload_dir | length > 0
        - kb_offload_mount.rc == 0

    # ── Phase 3: Python venv ──────────────────────────────────────────────────

    - name: "Phase 3: Create Python venv"
      ansible.builtin.command:
        cmd: "python3 -m venv {{ kb_home }}/venv"
        creates: "{{ kb_home }}/venv/bin/python"
      become_user: "{{ kb_user }}"

    - name: Upgrade pip in venv
      ansible.builtin.command:
        cmd: "{{ kb_home }}/venv/bin/pip install --no-cache-dir --upgrade pip setuptools wheel"
      become_user: "{{ kb_user }}"
      changed_when: false

    # ── Phase 4: Python dependencies ─────────────────────────────────────────

    - name: "Phase 4: Install Python libraries in venv"
      ansible.builtin.pip:
        name:
          - sentence-transformers>=3.0
          - chromadb>=0.5
          - fastapi>=0.115
          - "uvicorn[standard]>=0.30"
          - "mcp>=1.27"
          - httpx>=0.27
          - pydantic>=2.0
          - gitpython>=3.1
          - pyyaml>=6.0
        state: present
        virtualenv: "{{ kb_home }}/venv"
        extra_args: "--no-cache-dir"
      become_user: "{{ kb_user }}"

    # ── Phase 5: Repo configs ─────────────────────────────────────────────────

    - name: "Phase 5: Copy repos manifest"
      ansible.builtin.copy:
        src: repos.yml
        dest: "{{ kb_home }}/config/repos.yml"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0644"

    # ── Phase 6: Server files ─────────────────────────────────────────────────

    - name: "Phase 6: Copy server files"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ kb_home }}/server/"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0644"
      loop:
        - ../server/__init__.py
        - ../server/api.py
        - ../server/chat.py
        - ../server/mcp_http.py
        - ../server/mcp_stdio.py

    # ── Phase 7: KB indexer + watcher scripts ────────────────────────────────

    - name: "Phase 7: Install kb_indexer.py"
      ansible.builtin.copy:
        src: kb_indexer.py
        dest: "{{ kb_home }}/scripts/kb_indexer.py"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"

    - name: "Phase 7b: Install kb_watcher.py"
      ansible.builtin.copy:
        src: kb_watcher.py
        dest: "{{ kb_home }}/scripts/kb_watcher.py"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"

    - name: "Phase 7c: Install kb_releases.py"
      ansible.builtin.copy:
        src: kb_releases.py
        dest: "{{ kb_home }}/scripts/kb_releases.py"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0755"

    - name: "Phase 7d: Install GitHub token env file (for releases API)"
      ansible.builtin.copy:
        # Persisted on the host so the watcher cron and manual kb_releases.py runs
        # share the same token. Kept 0600 instead of inlining it in /etc/cron.d.
        dest: "{{ kb_home }}/.gh_token"
        content: "export GH_TOKEN={{ gh_token }}\n"
        owner: "{{ kb_user }}"
        group: "{{ kb_user }}"
        mode: "0600"
      no_log: true
      when: gh_token | length > 0
      tags: [reindex, reindex_releases]

    # ── Phase 8: Index KB ─────────────────────────────────────────────────────

    # NOTE: tasks call the venv's python directly (not `source .../activate`) so
    # they work under /bin/sh (dash), where `source` does not exist.

    - name: "Phase 8: Index tier1 repos (initial setup)"
      ansible.builtin.shell: "{{ kb_home }}/venv/bin/python3 scripts/kb_indexer.py --tier1"
      args:
        chdir: "{{ kb_home }}"
      become_user: "{{ kb_user }}"
      timeout: 3600
      when: reindex_repo == ""
      tags: [reindex, reindex_tier1]

    - name: "Phase 8b: Index all repos (full re-index)"
      ansible.builtin.shell: "{{ kb_home }}/venv/bin/python3 scripts/kb_indexer.py --all"
      args:
        chdir: "{{ kb_home }}"
      become_user: "{{ kb_user }}"
      timeout: 10800
      when: reindex_repo == ""
      tags: [reindex_all]

    - name: "Phase 8c: Index single repo"
      ansible.builtin.shell: "{{ kb_home }}/venv/bin/python3 scripts/kb_indexer.py --repo {{ reindex_repo }}"
      args:
        chdir: "{{ kb_home }}"
      become_user: "{{ kb_user }}"
      timeout: 1800
      when: reindex_repo != ""
      tags: [reindex]

    - name: "Phase 8d: Index GitHub releases + write versions.json (full)"
      ansible.builtin.shell: |
        [ -f {{ kb_home }}/.gh_token ] && . {{ kb_home }}/.gh_token
        {{ kb_home }}/venv/bin/python3 scripts/kb_releases.py --all
      args:
        chdir: "{{ kb_home }}"
      become_user: "{{ kb_user }}"
      timeout: 3600
      when: reindex_repo == ""
      tags: [reindex, reindex_releases]

    - name: "Phase 8e: Index GitHub releases for single repo"
      ansible.builtin.shell: |
        [ -f {{ kb_home }}/.gh_token ] && . {{ kb_home }}/.gh_token
        {{ kb_home }}/venv/bin/python3 scripts/kb_releases.py --repo {{ reindex_repo }}
      args:
        chdir: "{{ kb_home }}"
      become_user: "{{ kb_user }}"
      timeout: 1800
      when: reindex_repo != ""
      tags: [reindex, reindex_releases]

    # ── Phase 9: Cron jobs ────────────────────────────────────────────────────

    - name: "Phase 9: Configure cron jobs"
      ansible.builtin.copy:
        dest: /etc/cron.d/la-toolkit-kb
        mode: "0644"
        content: |
          # Living Atlas KB — hourly watcher
          # Polls each repo's default branch (git ls-remote) AND latest GitHub release;
          # re-indexes file content / release notes only when a change is detected.
          # GH_TOKEN is sourced from {{ kb_home }}/.gh_token (0600) — not inlined here.
          # Calls the venv python directly (no `source activate`) so it runs under /bin/sh.
          0 * * * * {{ kb_user }} { [ -f {{ kb_home }}/.gh_token ] && . {{ kb_home }}/.gh_token; {{ kb_home }}/venv/bin/python3 {{ kb_home }}/scripts/kb_watcher.py; } >> {{ kb_home }}/logs/watcher.log 2>&1

    # ── Phase 10: Systemd services ────────────────────────────────────────────

    - name: "Phase 10: Create systemd service for REST API"
      ansible.builtin.copy:
        dest: /etc/systemd/system/la-toolkit-kb-api.service
        mode: "0644"
        content: |
          [Unit]
          Description=Living Atlas KB REST API
          After=network.target

          [Service]
          User={{ kb_user }}
          WorkingDirectory={{ kb_home }}
          Environment=CHROMA_PATH={{ chroma_path }}
          Environment=KB_VERSIONS_FILE={{ kb_home }}/data/versions.json
          ExecStart={{ kb_home }}/venv/bin/python -m uvicorn server.api:app --host 127.0.0.1 --port {{ rest_api_port }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for MCP HTTP server
      ansible.builtin.copy:
        dest: /etc/systemd/system/la-toolkit-kb-mcp.service
        mode: "0644"
        content: |
          [Unit]
          Description=Living Atlas KB MCP HTTP Server
          After=la-toolkit-kb-api.service

          [Service]
          User={{ kb_user }}
          WorkingDirectory={{ kb_home }}
          Environment=KB_API_URL=http://localhost:8080
          ExecStart={{ kb_home }}/venv/bin/python server/mcp_http.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop:
        - la-toolkit-kb-api
        - la-toolkit-kb-mcp

    # ── Phase 10b: Intro page ─────────────────────────────────────────────────

    - name: Create web root directory
      ansible.builtin.file:
        path: /var/www/la-toolkit-kb
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    # NOTE: No static index.html is written here. The web root is served by the
    # Flutter web build (deploy.yml builds + rsyncs dart/example/build/web/,
    # including its own index.html). Writing a landing page here would overwrite
    # the Flutter app's index.html and shadow the SPA. The API's own landing page
    # still lives in server/api.py at "/" (reachable via the backend) without
    # clobbering any served file.

    # ── Phase 11: nginx ───────────────────────────────────────────────────────
    #
    # nginx is NOT configured here. It is owned exclusively by deploy.yml, which
    # writes a single 443-ssl site `kb` that:
    #   - serves the Flutter web SPA from /var/www/la-toolkit-kb (try_files
    #     $uri $uri/ /index.html),
    #   - proxies /api/, /health and /mcp to the backend services,
    #   - redirects port 80 → https.
    #
    # This backend terminates TLS itself with its own Let's Encrypt cert at
    # /etc/letsencrypt/live/{{ kb_domain }}/ (renewed by certbot.timer); the
    # upstream Apache edge proxies https→443 here. deploy.yml asserts the cert
    # exists before writing the ssl site and opens 80/443 in UFW. Run
    # `ansible-playbook ansible/deploy.yml` to (re)configure nginx + deploy the app.

  handlers:
    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

    - name: Restart auditd
      # auditd cannot be restarted via systemctl on some hosts; service works.
      ansible.builtin.command: service auditd restart
      changed_when: true
      failed_when: false
