---
# ansible/install_ollama.yml
# Installs Ollama, configures extra volume, and pulls the configured LLM model.
#
# Usage:
#   ansible-playbook ansible/install_ollama.yml -i inventory.ini
#
# Variables (override in inventory or extra-vars):
#   ollama_model:        qwen3-coder:30b
#   ollama_host:         127.0.0.1
#   ollama_port:         11434
#   ollama_data_dir:     /var/lib/ollama   (mount point for extra volume)
#   ollama_data_device:  /dev/vdb          (extra OpenStack volume)
#   ollama_data_fstype:  ext4

- name: Install Ollama, configure storage, and pull LLM model
  hosts: kb
  become: true
  vars:
    ollama_model: "qwen3-coder:30b"
    ollama_host: "127.0.0.1"
    ollama_port: 11434
    ollama_install_script: "https://ollama.com/install.sh"
    ollama_service_user: ollama
    ollama_data_dir: /var/lib/ollama
    ollama_data_device: /dev/vdb
    ollama_data_fstype: ext4

  tasks:
    # ── Volume setup ─────────────────────────────────────────────────────────

    - name: Check if extra volume has a filesystem
      ansible.builtin.command:
        cmd: "blkid -s TYPE -o value {{ ollama_data_device }}"
      register: blkid_result
      changed_when: false
      failed_when: false

    - name: Format extra volume (only if no filesystem detected)
      ansible.builtin.command:
        cmd: "mkfs.{{ ollama_data_fstype }} -L ollama-data {{ ollama_data_device }}"
      when: blkid_result.stdout | trim == ""
      changed_when: true

    - name: Ensure mount point exists
      ansible.builtin.file:
        path: "{{ ollama_data_dir }}"
        state: directory
        mode: "0755"

    - name: Mount extra volume and persist in fstab
      ansible.posix.mount:
        path: "{{ ollama_data_dir }}"
        src: "LABEL=ollama-data"
        fstype: "{{ ollama_data_fstype }}"
        opts: defaults,noatime,nofail
        state: mounted

    # ── Ollama install ────────────────────────────────────────────────────────

    - name: Check if Ollama is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/ollama
      register: ollama_bin

    - name: Download and run Ollama install script
      ansible.builtin.shell:
        cmd: "curl -fsSL {{ ollama_install_script }} | sh"
      when: not ollama_bin.stat.exists
      changed_when: true

    - name: Set ownership of data directory to ollama user
      ansible.builtin.file:
        path: "{{ ollama_data_dir }}"
        owner: "{{ ollama_service_user }}"
        group: "{{ ollama_service_user }}"
        recurse: false

    # ── Systemd override ──────────────────────────────────────────────────────

    - name: Remove legacy models-path.conf if present
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d/models-path.conf
        state: absent
      notify: Restart ollama

    - name: Ensure systemd override directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: "0755"

    - name: Configure Ollama systemd override (bind address + data dir)
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        content: |
          [Service]
          Environment="OLLAMA_HOST={{ ollama_host }}:{{ ollama_port }}"
          Environment="OLLAMA_MODELS={{ ollama_data_dir }}/models"
        mode: "0644"
      notify: Restart ollama

    - name: Enable and start Ollama service
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
        daemon_reload: true

    # ── Model pull ────────────────────────────────────────────────────────────

    - name: Wait for Ollama API to be ready
      ansible.builtin.uri:
        url: "http://{{ ollama_host }}:{{ ollama_port }}/api/version"
        status_code: 200
      register: ollama_ready
      retries: 12
      delay: 5
      until: ollama_ready.status == 200

    - name: Check if model is already pulled
      ansible.builtin.uri:
        url: "http://{{ ollama_host }}:{{ ollama_port }}/api/show"
        method: POST
        body_format: json
        body:
          name: "{{ ollama_model }}"
        status_code: [200, 404]
      register: model_check

    - name: Pull Ollama model (may take several minutes)
      ansible.builtin.uri:
        url: "http://{{ ollama_host }}:{{ ollama_port }}/api/pull"
        method: POST
        body_format: json
        body:
          name: "{{ ollama_model }}"
          stream: false
        timeout: 1800
        status_code: 200
      when: model_check.status == 404

  handlers:
    - name: Restart ollama
      ansible.builtin.systemd:
        name: ollama
        state: restarted
        daemon_reload: true
